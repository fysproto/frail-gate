<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フレイル測定 受付</title>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif;">
    <h2>フレイル測定を開始します</h2>
    <p>以下の内容でよろしければ、ボタンを押してください。</p>

    <form action="https://city.frail-yobo.jp/surveys" method="POST">
        <input type="hidden" id="eid_field" name="eventId">
        <input type="hidden" id="uid_field" name="personalId">

        <div style="background:#f0f0f0; padding:20px; margin:20px; border-radius:10px;">
            <p>イベント：<b id="disp_eid"></b></p>
            <p>個人ID：<b id="disp_uid"></b></p>
        </div>

        <button type="submit" style="width:90%; height:100px; background:#4A90E2; color:white; font-size:24px; border:none; border-radius:15px; font-weight:bold;">
            測定を始める（次へ）
        </button>
    </form>

    <script>
        // URLの ?eid=...&uid=... を読み取ってフォームに埋め込む
        const params = new URLSearchParams(window.location.search);
        const eid = params.get('eid');
        const uid = params.get('uid');
        
        document.getElementById('eid_field').value = eid;
        document.getElementById('uid_field').value = uid;
        document.getElementById('disp_eid').innerText = eid;
        document.getElementById('disp_uid').innerText = uid;
    </script>
</body>
</html>
